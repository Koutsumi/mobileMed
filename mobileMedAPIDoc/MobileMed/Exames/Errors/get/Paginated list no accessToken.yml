info:
  name: Paginated list no accessToken
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/exames/paginated?page=1&pageSize=10"
  params:
    - name: page
      value: "1"
      type: query
    - name: pageSize
      value: "10"
      type: query

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "401"
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.data[0].id
        method: jsonq
      variable:
        name: exameId
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{BASE_URL}}/exames/paginated?page=1&pageSize=10"
      method: GET
      params:
        - name: page
          value: "1"
          type: query
        - name: pageSize
          value: "10"
          type: query
