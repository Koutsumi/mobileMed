info:
  name: Exame by id no accessToken
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE_URL}}/exames/{{exameId}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "401"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

