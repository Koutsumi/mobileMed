info:
  name: Create exame no accessToken
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/exames/"
  body:
    type: json
    data: |-
      {
        "patientId": "{{pacienteId}}",
        "modality": "CT",
        "requestedAt": "{{currentDate}}",
        "idempotencyKey": "{{$randomUUID}}"
      }

runtime:
  scripts:
    - type: before-request
      code: |-
        const currentDate = new Date();

        bru.setVar("currentDate", currentDate);
  assertions:
    - expression: res.status
      operator: eq
      value: "401"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{BASE_URL}}/exames/"
      method: POST
      body:
        type: json
        data: |-
          {
            "patientId": "{{pacienteId}}",
            "modality": "CT",
            "requestedAt": "{{currentDate}}",
            "idempotencyKey": "{{$randomUUID}}"
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: x-powered-by
          value: Express
        - name: access-control-allow-origin
          value: "*"
        - name: content-type
          value: application/json; charset=utf-8
        - name: content-length
          value: "1901"
        - name: etag
          value: W/"76d-umMkCzocULKvkw7VKq7UFxJCE9g"
        - name: date
          value: Sat, 21 Feb 2026 14:34:45 GMT
        - name: connection
          value: keep-alive
        - name: keep-alive
          value: timeout=5
      body:
