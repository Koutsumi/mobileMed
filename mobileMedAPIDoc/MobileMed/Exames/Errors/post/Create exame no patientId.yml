info:
  name: Create exame no patientId
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE_URL}}/exames/"
  body:
    type: json
    data: |-
      {
        //"patientId": "{{pacienteId}}",
        "modality": "CT",
        //"requestedAt": "{{currentDate}}",
        "idempotencyKey": "{{$randomUUID}}"
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  scripts:
    - type: before-request
      code: |-
        const currentDate = new Date();

        bru.setVar("currentDate", currentDate);
  assertions:
    - expression: res.status
      operator: eq
      value: "400"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{BASE_URL}}/exames/"
      method: POST
      body:
        type: json
        data: |-
          {
            //"patientId": "{{pacienteId}}",
            "modality": "CT",
            //"requestedAt": "{{currentDate}}",
            "idempotencyKey": "{{$randomUUID}}"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: x-powered-by
          value: Express
