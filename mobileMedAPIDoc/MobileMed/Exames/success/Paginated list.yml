info:
  name: Paginated list
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/exames/paginated?page=1&pageSize=10"
  params:
    - name: page
      value: "1"
      type: query
    - name: pageSize
      value: "10"
      type: query
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.data[0].id
        method: jsonq
      variable:
        name: exameId
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

