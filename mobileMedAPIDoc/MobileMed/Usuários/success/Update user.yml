info:
  name: Update user
  type: http
  seq: 1

http:
  method: PUT
  url: "{{BASE_URL}}/user-system/{{otherUserId}}"
  body:
    type: json
    data: |-
      {
        "id": "{{otherUserId}}",
        "name": "{{$randomFullName}}",
        "email": "{{$randomEmail}}",
        "password": "test@123",
        "status": 1
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
