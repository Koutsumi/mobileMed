info:
  name: Users list paginated
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/user-system/paginated?page=1&pageSize=10"
  params:
    - name: page
      value: "1"
      type: query
    - name: pageSize
      value: "10"
      type: query
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        const otherUser = body.data.find(user => user.name.trim() !== "Samuel Bertoni");

        if (otherUser) {
          bru.setVar("otherUserId", otherUser.id);
          console.log("ID capturado com sucesso: " + otherUser.id);
        } else {
          console.error("Nenhum usuário diferente de Samuel Bertoni foi encontrado.");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{BASE_URL}}/user-system/paginated?page=1&pageSize=10"
      method: GET
      params:
        - name: page
          value: "1"
          type: query
        - name: pageSize
          value: "10"
          type: query
