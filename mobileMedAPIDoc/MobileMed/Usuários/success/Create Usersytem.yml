info:
  name: Create Usersytem
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/user-system"
  body:
    type: json
    data: |-
      {
        "name": "{{$randomFullName}}",
        "email": "{{$randomEmail}}",
        "password": "test@123",
        "status": 1
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

