info:
  name: Delete Usersystem
  type: http
  seq: 1

http:
  method: DELETE
  url: "{{BASE_URL}}/user-system/{{$randomUUID}}"
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
