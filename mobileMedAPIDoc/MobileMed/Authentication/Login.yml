info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{passsword}}"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.statusCode
      operator: eq
      value: "200"
    - expression: res.body.message
      operator: eq
      value: UserSystem found
    - expression: res.body.data.userId
      operator: isNotEmpty
    - expression: res.body.data.userName
      operator: eq
      value: "{{userName}}"
    - expression: res.body.data.userEmail
      operator: eq
      value: "{{email}}"
    - expression: res.body.data.expiresIn
      operator: eq
      value: "86400"
    - expression: res.body.data.accessToken
      operator: isNotEmpty
    - expression: res.body.url
      operator: eq
      value: /auth/login/{{email}}
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.data.accessToken
        method: jsonq
      variable:
        name: accessToken
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{BASE_URL}}/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "{{email}}",
            "password": "{{passsword}}"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: x-powered-by
          value: Express
        - name: access-control-allow-origin
