info:
  name: Update Paciente with no registred id
  type: http
  seq: 3

http:
  method: PUT
  url: "{{BASE_URL}}/pacientes/{{$randomUUID}}"
  body:
    type: json
    data: |-
      {
        "name": "{{$randomFullName}}",
        "document": "{{randomCpf}}"
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
