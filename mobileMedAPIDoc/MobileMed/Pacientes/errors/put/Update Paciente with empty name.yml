info:
  name: Update Paciente with empty name
  type: http
  seq: 1

http:
  method: PUT
  url: "{{BASE_URL}}/pacientes/{{pacienteId}}"
  body:
    type: json
    data: |-
      {
        //"name": "{{$randomFullName}}",
        "document": "{{randomCpf}}"
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

