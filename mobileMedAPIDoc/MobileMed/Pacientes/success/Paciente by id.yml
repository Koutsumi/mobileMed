info:
  name: Paciente by id
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/pacientes/{{pacienteId}}"
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

