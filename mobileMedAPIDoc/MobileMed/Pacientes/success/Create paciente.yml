info:
  name: Create paciente
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/pacientes/"
  body:
    type: json
    data: |-
      {
        "name": "{{$randomFullName}}",
        "document": "{{randomCpf}}"
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  scripts:
    - type: before-request
      code: |-
        // Obtém a data atual no formato ISO (YYYY-MM-DD)
        const currentDate = new Date().toISOString().split('T')[0];

        // Define uma variável chamada 'dataHoje' que pode ser usada na requisição
        bru.setVar("currentDate", currentDate);
  assertions:
    - expression: res.status
      operator: eq
      value: "204"
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.id
        method: jsonq
      variable:
        name: pacienteId
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{BASE_URL}}/pacientes/"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "{{$randomFullName}}",
            "document": "{{randomCpf}}"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: x-powered-by
          value: Express
        - name: access-control-allow-origin
          value: "*"
        - name: content-type
          value: application/json; charset=utf-8
        - name: content-length
          value: "250"
        - name: etag
          value: W/"fa-ySSILyTtKBFcaIP/PAMxnuQPI7g"
        - name: date
          value: Sat, 21 Feb 2026 12:54:49 GMT
        - name: connection
          value: keep-alive
        - name: keep-alive
          value: timeout=5
      body:
        type: json
        data: |-
          {
            "id": "30ac5cd6-42b8-4b45-b870-ceff5a23ad8f",
            "name": "Elena Powlowski-Johnson",
            "document": "33622670681",
            "exams": [],
