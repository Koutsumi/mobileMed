info:
  name: Update Paciente
  type: http
  seq: 1

http:
  method: PUT
  url: "{{BASE_URL}}/pacientes/{{pacienteId}}"
  body:
    type: json
    data: |-
      {
        "id": "{{pacienteId}}",
        "name": "{{$randomFullName}}",
        "document": "{{randomCpf}}"
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

