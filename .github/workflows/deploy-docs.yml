name: Deploy Playwright Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Playwright project dependencies
        run: npm ci || npm install --no-audit --no-fund

      - name: Generate Playwright static documentation
        run: npm run doc:generate

      - name: Validate generated documentation
        run: test -f documentation/index.html

      - name: Deploy documentation to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: documentation
          clean: true
